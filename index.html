<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LIFFフォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<h2>登録フォーム</h2>

<form id="form">
  名前：<input type="text" id="name"><br><br>
  メール：<input type="email" id="email"><br><br>
  <button type="submit">送信</button>
</form>

<script>
const LIFF_ID = "2009806222-LGosT3pY";

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isInClient()) {
      document.body.innerHTML = "LINEから開いてください";
      return;
    }

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    console.log("ログインOK");
  } catch (err) {
    document.body.innerHTML = "エラー: " + err;
  }
}

main();

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    if (!liff.isLoggedIn()) {
      alert("ログインしてください");
      return;
    }

    const profile = await liff.getProfile();

    const data = {
      userId: profile.userId,
      name: document.getElementById("name").value,
      email: document.getElementById("email").value
    };

    const res = await fetch("https://script.google.com/macros/s/AKfycbxDM7-W4R93IF2F-X7p8C5M2uh7mpBBnCPQVSvVmZ1sOlzyXgQJE566JWkqJBJrwaZR/exec", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    alert("送信完了！");
  } catch (err) {
    alert("エラー: " + err);
  }
});
</script>

</body>
</html>
