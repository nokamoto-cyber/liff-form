<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LIFFフォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<h2>登録フォーム</h2>

<form id="form">
  名前：<input type="text" id="name"><br><br>
  メール：<input type="email" id="email"><br><br>
  <button type="submit">送信</button>
</form>

<script>
const LIFF_ID = "2009806222-LGosT3pY";

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isInClient()) {
      document.body.innerHTML = "LINEから開いてください";
      return;
    }

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    console.log("ログインOK");
  } catch (err) {
    document.body.innerHTML = "エラー: " + err;
  }
}

main();

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    if (!liff.isLoggedIn()) {
      alert("ログインしてください");
      return;
    }

    const profile = await liff.getProfile();
    
const form = document.createElement("form");
form.method = "POST";
form.action = "https://script.google.com/macros/s/AKfycbxDM7-W4R93IF2F-X7p8C5M2uh7mpBBnCPQVSvVmZ1sOlzyXgQJE566JWkqJBJrwaZR/exec";

const userIdInput = document.createElement("input");
userIdInput.type = "hidden"; // 🔥これ重要
userIdInput.name = "userId";
userIdInput.value = profile.userId;
form.appendChild(userIdInput);

const nameInput = document.createElement("input");
nameInput.type = "hidden"; // 🔥これ重要
nameInput.name = "name";
nameInput.value = document.getElementById("name").value;
form.appendChild(nameInput);

const emailInput = document.createElement("input");
emailInput.type = "hidden"; // 🔥これ重要
emailInput.name = "email";
emailInput.value = document.getElementById("email").value;
form.appendChild(emailInput);

document.body.appendChild(form);
form.submit();
  } catch (err) {
    alert("エラー: " + err);
  }
});
</script>

</body>
</html>
